model_name: floodcast
display_name: FloodCast
hazard: Flood
source_file: pyhazards/models/floodcast.py
builder_name: floodcast_builder
summary: >
  A compact spatiotemporal flood-inundation baseline for raster forecast experiments.
description:
  - >
    ``floodcast`` is the first public inundation model in the staged PyHazards
    flood roadmap.
  - >
    The adapter uses shared raster tensors so it can be benchmarked through the
    ``flood.inundation`` evaluator without dataset-specific glue code.
paper:
  title: Large-scale flood modeling and forecasting with FloodCast
  url: https://doi.org/10.1038/s41586-024-08028-8
  repo_url: https://github.com/HydroPML/FloodCast
tasks:
  - regression
  - segmentation
example: |
  import torch
  from pyhazards.models import build_model

  model = build_model(name="floodcast", task="regression", in_channels=3, history=4)
  preds = model(torch.randn(2, 4, 3, 16, 16))
  print(preds.shape)
notes:
  - "Outputs are next-horizon inundation depth rasters."
smoke_test:
  task: regression
  build_kwargs:
    in_channels: 3
    history: 4
    hidden_dim: 32
  input:
    kind: tensor
    tensor:
      shape: [2, 4, 3, 16, 16]
  expected_output:
    kind: tensor
    shape: [2, 1, 16, 16]
