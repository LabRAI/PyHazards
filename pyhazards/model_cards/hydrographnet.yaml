model_name: hydrographnet
display_name: HydroGraphNet
hazard: Flood
catalog_status: variant
source_file: pyhazards/models/hydrographnet.py
builder_name: hydrographnet_builder
summary: >
  A physics-informed graph neural network for flood forecasting with interpretable
  KAN-style components, residual message passing, and delta-state decoding.
description:
  - >
    ``hydrographnet`` is the PyHazards entrypoint for flood forecasting on irregular
    meshes with graph-structured hydrologic state updates.
  - >
    In PyHazards, this model is typically paired with the ERA5-based hydrograph
    adapter ``load_hydrograph_data`` for end-to-end smoke validation.
paper:
  title: Interpretable physics-informed graph neural networks for flood forecasting
  url: https://onlinelibrary.wiley.com/doi/10.1111/mice.13484
tasks:
  - regression
example: |
  import torch
  from pyhazards.models import build_model

  model = build_model(
      name="hydrographnet",
      task="regression",
      node_in_dim=2,
      edge_in_dim=3,
      out_dim=1,
  )

  batch = {
      "x": torch.randn(1, 3, 6, 2),
      "adj": torch.eye(6).unsqueeze(0),
      "coords": torch.randn(6, 2),
  }
  preds = model(batch)
  print(preds.shape)
notes:
  - "The smoke test uses a synthetic graph batch so it stays CPU-safe in CI."
smoke_test:
  task: regression
  build_kwargs:
    node_in_dim: 2
    edge_in_dim: 3
    out_dim: 1
  input:
    kind: mapping
    mapping:
      x:
        shape: [1, 3, 6, 2]
      adj:
        shape: [1, 6, 6]
      coords:
        shape: [6, 2]
  expected_output:
    kind: tensor
    shape: [1, 6, 1]
