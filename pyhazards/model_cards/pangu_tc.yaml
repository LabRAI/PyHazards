model_name: pangu_tc
display_name: Pangu TC Adapter
hazard: Tropical Cyclone
catalog_status: experimental
source_file: pyhazards/models/pangu_tc.py
builder_name: pangu_tc_builder
summary: >
  An experimental wrapper-style storm adapter inspired by Pangu-Weather forecast fields.
description:
  - >
    ``pangu_tc`` adds a second foundation-weather reference path behind the
    shared tropical-cyclone evaluator.
  - >
    The implementation is intentionally lightweight and should be interpreted as
    an adapter contract for forecast-field driven storm evaluation.
paper:
  title: Pangu-Weather repository
  url: https://github.com/198808xc/Pangu-Weather
tasks:
  - regression
example: |
  import torch
  from pyhazards.models import build_model

  model = build_model(name="pangu_tc", task="regression", input_dim=8, horizon=5)
  preds = model(torch.randn(2, 6, 8))
  print(preds.shape)
notes:
  - "Experimental adapter: intended for shared-evaluator prototyping rather than exact weather-model parity."
smoke_test:
  task: regression
  build_kwargs:
    input_dim: 8
    horizon: 5
    output_dim: 3
  input:
    kind: tensor
    tensor:
      shape: [2, 6, 8]
  expected_output:
    kind: tensor
    shape: [2, 5, 3]
