model_name: wildfire_fpa_forecast
display_name: Wildfire FPA Forecast
hazard: Wildfire
source_file: pyhazards/models/wildfire_fpa_forecast.py
builder_name: wildfire_fpa_forecast_builder
summary: >
  An LSTM plus autoencoder wildfire forecasting baseline for next-window count prediction.
description:
  - >
    ``wildfire_fpa_forecast`` exposes the temporal forecasting stage of the
    broader FPA-FOD wildfire framework as its own registry entry.
  - >
    The PyHazards adapter keeps the paper-inspired forecasting path while using
    the shared builder contract and smoke-test interface.
paper:
  title: Developing risk assessment framework for wildfire in the United States
  url: https://www.sciencedirect.com/science/article/pii/S2949926723000033
tasks:
  - regression
  - forecasting
example: |
  import torch
  from pyhazards.models import build_model

  model = build_model(
      name="wildfire_fpa_forecast",
      task="forecasting",
      input_dim=5,
      output_dim=5,
      lookback=12,
  )
  preds = model(torch.randn(2, 12, 5))
  print(preds.shape)
notes:
  - "The smoke test validates only the forecasting output path, not reconstruction diagnostics."
smoke_test:
  task: forecasting
  build_kwargs:
    input_dim: 5
    output_dim: 5
    hidden_dim: 32
    latent_dim: 16
    lookback: 12
  input:
    kind: tensor
    tensor:
      shape: [2, 12, 5]
  expected_output:
    kind: tensor
    shape: [2, 5]
