model_name: tropicalcyclone_mlp
display_name: tropicalcyclone_MLP
hazard: Hurricane
source_file: pyhazards/models/tropicalcyclone_mlp.py
builder_name: tropicalcyclone_mlp_builder
summary: >
  A compact MLP baseline for hurricane track and intensity forecasting.
description:
  - >
    ``tropicalcyclone_mlp`` complements ``hurricast`` with a lighter-weight
    hurricane baseline that uses the same storm-history input contract.
  - >
    The adapter is useful for practical low-cost intensity and trajectory
    experiments in basin-filtered settings.
paper:
  title: Deep Learning Experiments for Tropical Cyclone Intensity Forecasts
  url: https://doi.org/10.1145/3447548.3467351
  repo_url: https://github.com/wenweixu/tropicalcyclone_MLP
tasks:
  - regression
example: |
  import torch
  from pyhazards.models import build_model

  model = build_model(name="tropicalcyclone_mlp", task="regression", input_dim=8, history=6)
  preds = model(torch.randn(2, 6, 8))
  print(preds.shape)
notes:
  - "Outputs are lead-time sequences of latitude, longitude, and intensity targets."
smoke_test:
  task: regression
  build_kwargs:
    input_dim: 8
    history: 6
    horizon: 5
    output_dim: 3
  input:
    kind: tensor
    tensor:
      shape: [2, 6, 8]
  expected_output:
    kind: tensor
    shape: [2, 5, 3]
