benchmark:
  name: wildfire
  hazard_task: wildfire.spread
  metrics:
    - iou
    - f1
    - burned_area_mae
  eval_split: test
dataset:
  name: wildfire_spread_synthetic
  params:
    micro: true
model:
  name: wrf_sfire
  task: segmentation
  params:
    in_channels: 12
    diffusion_steps: 3
report:
  output_dir: reports/wrf_sfire
  formats:
    - json
seed: 7
