benchmark:
  name: tc
  hazard_task: tc.track_intensity
  metrics:
    - track_error
    - intensity_mae
  eval_split: test
dataset:
  name: tropicyclonenet_dataset
  params:
    micro: true
model:
  name: tropicyclonenet
  task: regression
  params:
    input_dim: 8
    hidden_dim: 64
    horizon: 5
    output_dim: 3
report:
  output_dir: reports/tropicyclonenet
  formats:
    - json
seed: 7
