benchmark:
  name: tc
  hazard_task: tc.track_intensity
  metrics:
    - track_error
    - intensity_mae
  eval_split: test
dataset:
  name: tc_tracks_synthetic
  params:
    micro: true
model:
  name: fourcastnet_tc
  task: regression
  params:
    input_dim: 8
    history: 6
    hidden_dim: 96
    horizon: 5
    output_dim: 3
report:
  output_dir: reports/fourcastnet_tc
  formats:
    - json
seed: 7
