benchmark:
  name: tc
  hazard_task: tc.track_intensity
  metrics:
    - track_error
    - intensity_mae
  eval_split: test
dataset:
  name: tcbench_alpha
  params:
    micro: true
model:
  name: saf_net
  task: regression
  params:
    input_dim: 8
    hidden_dim: 64
    horizon: 5
report:
  output_dir: reports/saf_net
  formats:
    - json
seed: 7
