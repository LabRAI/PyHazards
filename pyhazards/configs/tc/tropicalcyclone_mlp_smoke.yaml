benchmark:
  name: tc
  hazard_task: tc.track_intensity
  metrics:
    - track_error
    - intensity_mae
  eval_split: test
dataset:
  name: tcbench_alpha
  params:
    micro: true
model:
  name: tropicalcyclone_mlp
  task: regression
  params:
    input_dim: 8
    history: 6
    horizon: 5
    output_dim: 3
report:
  output_dir: reports/tc_mlp
  formats:
    - json
seed: 7
