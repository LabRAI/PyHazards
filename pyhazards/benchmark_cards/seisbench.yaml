slug: seisbench
display_name: SeisBench
kind: ecosystem
hazard_family: Earthquake
benchmark_key: earthquake
support_status: synthetic-backed
summary: >
  SeisBench-shaped waveform picking support for the shared earthquake benchmark family.
description:
  - >
    The current SeisBench path uses a synthetic waveform adapter that preserves the same
    picking task shape expected by the shared earthquake benchmark.
  - >
    It exists today as a benchmark-compatible smoke path rather than a full external
    SeisBench ingestion pipeline.
source:
  title: SeisBench - A Toolbox for Machine Learning in Seismology
  url: https://joss.theoj.org/papers/10.21105/joss.04418
  repo_url: https://github.com/seisbench/seisbench
tasks:
  - earthquake.picking
metrics:
  - p_pick_mae
  - s_pick_mae
  - precision
  - recall
  - f1
smoke_configs:
  - pyhazards/configs/earthquake/phasenet_smoke.yaml
  - pyhazards/configs/earthquake/eqnet_smoke.yaml
linked_models:
  - phasenet
  - eqnet
