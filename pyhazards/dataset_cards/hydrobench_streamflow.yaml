slug: hydrobench_streamflow
display_name: HydroBench
hazard_family: Flood
source_role: Streamflow Benchmark
summary: Synthetic-backed streamflow diagnostics adapter aligned to the HydroBench ecosystem.
provider: HydroBench ecosystem surfaced through a PyHazards adapter
geometry: Graph-temporal basin or node sequences
spatial_resolution: Basin or gauge nodes represented as graph elements
temporal_resolution: Rolling history windows for streamflow prediction
update_cadence: Generated locally for smoke and benchmark-alignment runs
period_of_record: Synthetic-backed benchmark adapter
coverage: Benchmark-aligned streamflow forecasting samples
formats: PyTorch graph-temporal dataset objects via the dataset registry
overview:
  - HydroBench is the public flood adapter used for streamflow diagnostics and HydroGraphNet-aligned benchmark runs.
  - The current implementation is synthetic-backed, but it preserves the streamflow task and metric contract exposed by the shared flood benchmark.
data_characteristics:
  - Graph-temporal sequences with node-level targets for next-step streamflow prediction.
  - Registry-backed benchmark adapter rather than a raw HydroBench dataset ingestion path.
  - Intended for HydroGraphNet smoke runs and flood benchmark diagnostics.
typical_use_cases:
  - HydroGraphNet smoke tests.
  - Shared flood benchmark runs with HydroBench-aligned metrics.
  - Diagnostics for graph-based flood forecasting experiments.
access_links:
  - label: HydroBench repository
    url: https://github.com/EMscience/HydroBench
inspection: null
registry:
  name: hydrobench_streamflow
  example: |
    from pyhazards.datasets import load_dataset

    data = load_dataset(
        "hydrobench_streamflow",
        micro=True,
        history=4,
        nodes=6,
    ).load()

    train = data.get_split("train")
    print(len(train.inputs), train.inputs[0].x.shape)
primary_references:
  - citation: HydroBench
    url: https://github.com/EMscience/HydroBench
pyhazards_usage:
  - Use this adapter when you want the public HydroBench-aligned streamflow surface exposed by the flood benchmark.
related_models:
  - hydrographnet
related_benchmarks:
  - flood_benchmark
  - hydrobench
notes:
  - This is a synthetic-backed benchmark adapter rather than a full HydroBench downloader.
