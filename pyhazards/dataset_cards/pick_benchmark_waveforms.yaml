slug: pick_benchmark_waveforms
display_name: pick-benchmark
hazard_family: Earthquake
source_role: Waveform Benchmark
summary: Synthetic-backed waveform picking adapter aligned to the pick-benchmark evaluation ecosystem.
provider: pick-benchmark ecosystem surfaced through a PyHazards adapter
geometry: Multichannel waveform windows
spatial_resolution: Benchmark-defined waveform channels and sample windows
temporal_resolution: Short waveform windows with phase-pick targets
update_cadence: Generated locally for smoke and benchmark-alignment runs
period_of_record: Synthetic-backed benchmark adapter
coverage: Benchmark-aligned earthquake phase-picking samples
formats: PyTorch tensors via the dataset registry
overview:
  - pick-benchmark is the public waveform adapter used by the earthquake benchmark for transformer and CNN picking baselines.
  - The current implementation is synthetic-backed, but it preserves the phase-picking task shape, labels, and metrics expected by the shared earthquake evaluator.
data_characteristics:
  - Multichannel waveform windows paired with P- and S-arrival sample targets.
  - Registry-backed benchmark adapter rather than a raw external waveform ingestion path.
  - Intended for phase-picking validation and smoke tests.
typical_use_cases:
  - EQTransformer and GPD smoke tests.
  - Shared earthquake picking benchmark runs.
  - Regression checks for waveform-based picking models.
access_links:
  - label: pick-benchmark repository
    url: https://github.com/seisbench/pick-benchmark
inspection: null
registry:
  name: pick_benchmark_waveforms
  example: |
    from pyhazards.datasets import load_dataset

    data = load_dataset(
        "pick_benchmark_waveforms",
        micro=True,
        channels=3,
        length=256,
    ).load()

    train = data.get_split("train")
    print(train.inputs.shape, train.targets.shape)
primary_references:
  - citation: pick-benchmark
    url: https://github.com/seisbench/pick-benchmark
pyhazards_usage:
  - Use this adapter when you want the public pick-benchmark-aligned waveform surface exposed by the earthquake benchmark.
related_models:
  - eqtransformer
  - gpd
related_benchmarks:
  - earthquake_benchmark
  - pick_benchmark
notes:
  - This is a synthetic-backed benchmark adapter rather than a full pick-benchmark downloader.
