slug: tropicyclonenet_dataset
display_name: TropiCycloneNet-Dataset
hazard_family: Tropical Cyclone
source_role: Track Benchmark
summary: Synthetic-backed storm-track benchmark adapter aligned to the TropiCycloneNet-Dataset ecosystem.
provider: TropiCycloneNet-Dataset ecosystem surfaced through a PyHazards adapter
geometry: Storm-track history sequences
spatial_resolution: Storm-centered best-track sequences
temporal_resolution: Historical track windows with forecast horizons
update_cadence: Generated locally for smoke and benchmark-alignment runs
period_of_record: Synthetic-backed benchmark adapter
coverage: Benchmark-aligned tropical cyclone track and intensity samples
formats: PyTorch tensors via the dataset registry
overview:
  - TropiCycloneNet-Dataset is the public storm adapter used by the TropiCycloneNet model path on the shared track-intensity evaluator.
  - The current implementation is synthetic-backed, but it preserves the task, metric, and reporting surface used by the shared tropical cyclone benchmark.
data_characteristics:
  - Storm-history sequences with future latitude, longitude, and intensity targets.
  - Registry-backed benchmark adapter rather than a raw external dataset ingestion path.
  - Intended for benchmark-linked storm forecasting smoke runs.
typical_use_cases:
  - TropiCycloneNet smoke tests.
  - Shared tropical cyclone benchmark runs.
  - Regression checks for track-intensity prediction models.
access_links:
  - label: TropiCycloneNet-Dataset repository
    url: https://github.com/xiaochengfuhuo/TropiCycloneNet-Dataset
inspection: null
registry:
  name: tropicyclonenet_dataset
  example: |
    from pyhazards.datasets import load_dataset

    data = load_dataset(
        "tropicyclonenet_dataset",
        micro=True,
        history=6,
        horizon=5,
    ).load()

    train = data.get_split("train")
    print(train.inputs.shape, train.targets.shape)
primary_references:
  - citation: TropiCycloneNet-Dataset
    url: https://github.com/xiaochengfuhuo/TropiCycloneNet-Dataset
pyhazards_usage:
  - Use this adapter when you want the public TropiCycloneNet-Dataset-aligned storm surface exposed by the tropical cyclone benchmark.
related_models:
  - tropicyclonenet
related_benchmarks:
  - tropical_cyclone_benchmark
  - tropicyclonenet_dataset
notes:
  - This is a synthetic-backed benchmark adapter rather than a full TropiCycloneNet-Dataset downloader.
