slug: ibtracs_tracks
display_name: IBTrACS
hazard_family: Tropical Cyclone
source_role: Track Archive
summary: Synthetic-backed storm-track adapter aligned to the IBTrACS tropical cyclone archive.
provider: NOAA NCEI International Best Track Archive for Climate Stewardship surfaced through a PyHazards adapter
geometry: Storm-track history sequences
spatial_resolution: Storm-centered best-track sequences
temporal_resolution: Historical track windows with forecast horizons
update_cadence: Generated locally for smoke and benchmark-alignment runs
period_of_record: Synthetic-backed benchmark adapter
coverage: Benchmark-aligned tropical cyclone track and intensity samples
formats: PyTorch tensors via the dataset registry
overview:
  - IBTrACS is the public storm-track adapter used by PyHazards for shared tropical cyclone benchmark runs.
  - The current implementation is synthetic-backed, but it preserves the track-intensity forecasting surface used by the shared tropical cyclone evaluator.
data_characteristics:
  - Storm-history sequences with future latitude, longitude, and intensity targets.
  - Registry-backed benchmark adapter rather than a raw IBTrACS archive loader.
  - Supports both basin-specific hurricane models and broader tropical cyclone adapters.
typical_use_cases:
  - Hurricast smoke tests.
  - Shared tropical cyclone benchmark runs for track and intensity prediction.
  - Benchmark-aligned validation for weather-model storm adapters.
access_links:
  - label: IBTrACS product page
    url: https://www.ncei.noaa.gov/products/international-best-track-archive
inspection: null
registry:
  name: ibtracs_tracks
  example: |
    from pyhazards.datasets import load_dataset

    data = load_dataset(
        "ibtracs_tracks",
        micro=True,
        history=6,
        horizon=5,
    ).load()

    train = data.get_split("train")
    print(train.inputs.shape, train.targets.shape)
primary_references:
  - citation: IBTrACS
    url: https://www.ncei.noaa.gov/products/international-best-track-archive
pyhazards_usage:
  - Use this adapter when you want the public IBTrACS-aligned storm-track surface exposed by the tropical cyclone benchmark.
related_models:
  - hurricast
  - graphcast_tc
  - pangu_tc
  - fourcastnet_tc
related_benchmarks:
  - tropical_cyclone_benchmark
  - ibtracs
notes:
  - This is a synthetic-backed benchmark adapter rather than a full IBTrACS ingestion pipeline.
