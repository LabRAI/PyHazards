slug: tcbench_alpha
display_name: TCBench Alpha
hazard_family: Tropical Cyclone
source_role: Track Benchmark
summary: Synthetic-backed storm-track benchmark adapter aligned to the TCBench Alpha ecosystem.
provider: TCBench Alpha ecosystem surfaced through a PyHazards adapter
geometry: Storm-track history sequences
spatial_resolution: Storm-centered best-track sequences
temporal_resolution: Historical track windows with forecast horizons
update_cadence: Generated locally for smoke and benchmark-alignment runs
period_of_record: Synthetic-backed benchmark adapter
coverage: Benchmark-aligned tropical cyclone track and intensity samples
formats: PyTorch tensors via the dataset registry
overview:
  - TCBench Alpha is the public storm adapter used by several tropical cyclone baselines on the shared track-intensity evaluator.
  - The current implementation is synthetic-backed, but it preserves the task, metric, and reporting surface used by the shared tropical cyclone benchmark.
data_characteristics:
  - Storm-history sequences with future latitude, longitude, and intensity targets.
  - Registry-backed benchmark adapter rather than a raw external benchmark ingestion path.
  - Intended for benchmark-linked track-intensity forecasting runs.
typical_use_cases:
  - Tropical Cyclone MLP, SAF-Net, and TCIF-fusion smoke tests.
  - Shared tropical cyclone benchmark runs.
  - Regression checks for storm-track baselines.
access_links:
  - label: TCBench Alpha repository
    url: https://github.com/msgomez06/TCBench_Alpha
inspection: null
registry:
  name: tcbench_alpha
  example: |
    from pyhazards.datasets import load_dataset

    data = load_dataset(
        "tcbench_alpha",
        micro=True,
        history=6,
        horizon=5,
    ).load()

    train = data.get_split("train")
    print(train.inputs.shape, train.targets.shape)
primary_references:
  - citation: TCBench Alpha
    url: https://github.com/msgomez06/TCBench_Alpha
pyhazards_usage:
  - Use this adapter when you want the public TCBench Alpha-aligned storm surface exposed by the tropical cyclone benchmark.
related_models:
  - tropicalcyclone_mlp
  - saf_net
  - tcif_fusion
related_benchmarks:
  - tropical_cyclone_benchmark
  - tcbench_alpha
notes:
  - This is a synthetic-backed benchmark adapter rather than a full TCBench Alpha ingestion pipeline.
