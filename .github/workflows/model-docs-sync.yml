name: Sync Model Docs

on:
  push:
    branches: [main, master]
    paths:
      - "pyhazards/model_cards/**"
      - "pyhazards/models/**"
      - "pyhazards/model_catalog.py"
      - "pyhazards/benchmark_catalog.py"
      - "pyhazards/appendix_a_catalog.py"
      - "scripts/render_model_docs.py"
      - "scripts/render_benchmark_docs.py"
      - "scripts/render_appendix_a_docs.py"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (CPU Torch + docs)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e .
          python -m pip install -r docs/requirements.txt

      - name: Regenerate and publish generated docs
        run: |
          python scripts/render_model_docs.py
          python scripts/render_benchmark_docs.py
          python scripts/render_appendix_a_docs.py
          cd docs
          sphinx-build -b html source build/html
          cp -r build/html/* .

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs; then
            echo "Model docs already up to date."
            exit 0
          fi
          git add docs
          git commit -m "docs(models): refresh published catalog"
          git push
