name: Sync Model Docs

on:
  push:
    branches: [main, master]
    paths:
      - "pyhazards/model_cards/**"
      - "pyhazards/models/**"
      - "pyhazards/model_catalog.py"
      - "scripts/render_model_docs.py"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (CPU Torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e .

      - name: Regenerate model docs
        run: python scripts/render_model_docs.py

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/source/pyhazards_models.rst docs/source/api/pyhazards.models.rst docs/source/modules; then
            echo "Model docs already up to date."
            exit 0
          fi
          git add docs/source/pyhazards_models.rst docs/source/api/pyhazards.models.rst docs/source/modules
          git commit -m "docs(models): refresh generated catalog"
          git push
