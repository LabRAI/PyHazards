name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (CPU Torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install pytest
          python -m pip install -e .

      - name: Import smoke test
        run: |
          python - <<'PY'
          import pyhazards
          print("pyhazards version:", pyhazards.__version__)
          PY

      - name: Full pytest suite
        run: python -m pytest tests

      - name: Generated model docs check
        run: python scripts/render_model_docs.py --check

      - name: Generated benchmark docs check
        run: python scripts/render_benchmark_docs.py --check

      - name: Catalog smoke test
        run: python scripts/verify_table_entries.py
